<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">不同 Agent 等级下的人类控制点</title>
  <desc id="desc">展示从 L0 到 L5，人工介入从逐步指令转向目标、规则、异常和责任控制。</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f8fb"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3d7dd8"/>
    </marker>
  </defs>
  <rect width="1200" height="620" fill="#f7fafc"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',Arial,sans-serif">
    <text x="70" y="78" font-size="34" font-weight="700" fill="#172033">能力升级后，人类控制点并不会消失</text>
    <text x="72" y="116" font-size="19" fill="#526173">从“每一步下指令”转向“定义目标、边界、验收标准和异常兜底”</text>

    <g transform="translate(90 180)">
      <rect x="0" y="0" width="250" height="280" rx="10" fill="url(#panel)" stroke="#d7e0ea"/>
      <text x="28" y="54" font-size="26" font-weight="700" fill="#1f7a8c">低等级 L0-L2</text>
      <text x="28" y="96" font-size="19" fill="#334155">人控制步骤</text>
      <text x="28" y="132" font-size="17" fill="#64748b">- 明确输入</text>
      <text x="28" y="164" font-size="17" fill="#64748b">- 指定工具</text>
      <text x="28" y="196" font-size="17" fill="#64748b">- 检查输出</text>
      <text x="28" y="228" font-size="17" fill="#64748b">- 决定下一步</text>
    </g>

    <g transform="translate(475 180)">
      <rect x="0" y="0" width="250" height="280" rx="10" fill="url(#panel)" stroke="#d7e0ea"/>
      <text x="28" y="54" font-size="26" font-weight="700" fill="#3d7dd8">中等级 L3-L4</text>
      <text x="28" y="96" font-size="19" fill="#334155">人控制节点</text>
      <text x="28" y="132" font-size="17" fill="#64748b">- 确认计划</text>
      <text x="28" y="164" font-size="17" fill="#64748b">- 授权行动</text>
      <text x="28" y="196" font-size="17" fill="#64748b">- 处理异常</text>
      <text x="28" y="228" font-size="17" fill="#64748b">- 验收结果</text>
    </g>

    <g transform="translate(860 180)">
      <rect x="0" y="0" width="250" height="280" rx="10" fill="url(#panel)" stroke="#d7e0ea"/>
      <text x="28" y="54" font-size="26" font-weight="700" fill="#7657c8">高等级 L5</text>
      <text x="28" y="96" font-size="19" fill="#334155">人控制制度</text>
      <text x="28" y="132" font-size="17" fill="#64748b">- 目标边界</text>
      <text x="28" y="164" font-size="17" fill="#64748b">- 策略约束</text>
      <text x="28" y="196" font-size="17" fill="#64748b">- 审计追责</text>
      <text x="28" y="228" font-size="17" fill="#64748b">- 停机机制</text>
    </g>

    <path d="M350 320 H455" stroke="#3d7dd8" stroke-width="5" marker-end="url(#arrow)"/>
    <path d="M735 320 H840" stroke="#3d7dd8" stroke-width="5" marker-end="url(#arrow)"/>

    <g transform="translate(160 520)">
      <circle cx="0" cy="0" r="10" fill="#1f7a8c"/>
      <text x="24" y="7" font-size="18" fill="#526173">越高级，越需要可观测日志、权限隔离、回滚机制和人工责任边界</text>
      <circle cx="610" cy="0" r="10" fill="#7657c8"/>
      <text x="634" y="7" font-size="18" fill="#526173">自治不是放任，而是更高密度的治理工程</text>
    </g>
  </g>
</svg>
