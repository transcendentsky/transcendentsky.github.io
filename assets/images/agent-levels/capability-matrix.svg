<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Agent capability matrix</title>
  <desc id="desc">A matrix comparing Agent capability levels across understanding, planning, tool use, memory, feedback, and governance.</desc>
  <defs>
    <style>
      .bg{fill:#fbfbfd}
      .head{fill:#22314f}
      .cell{fill:#fff;stroke:#d8dee9;stroke-width:1.5}
      .on1{fill:#e8f1ff}.on2{fill:#eaf7f0}.on3{fill:#fff3da}.on4{fill:#ffecef}.on5{fill:#eceffd}
      .ink{fill:#1f2937;font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .muted{fill:#64748b;font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .white{fill:#fff;font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif}
    </style>
  </defs>
  <rect class="bg" width="1200" height="640"/>
  <text class="ink" x="60" y="70" font-size="34" font-weight="700">能力维度不是同时跃迁，而是逐层补齐</text>
  <text class="muted" x="60" y="108" font-size="18">一个系统可能工具调用很强，但没有目标分解和反馈机制，因此仍然停留在 L2。</text>

  <rect class="head" x="80" y="155" width="1040" height="56" rx="12"/>
  <text class="white" x="112" y="191" font-size="18" font-weight="700">能力维度</text>
  <text class="white" x="325" y="191" font-size="18" font-weight="700">L1</text>
  <text class="white" x="455" y="191" font-size="18" font-weight="700">L2</text>
  <text class="white" x="585" y="191" font-size="18" font-weight="700">L3</text>
  <text class="white" x="715" y="191" font-size="18" font-weight="700">L4</text>
  <text class="white" x="845" y="191" font-size="18" font-weight="700">L5</text>

  <g font-size="16">
    <rect class="cell" x="80" y="230" width="220" height="58"/><text class="ink" x="112" y="266" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">任务理解</text>
    <rect class="cell on1" x="300" y="230" width="130" height="58"/><rect class="cell on2" x="430" y="230" width="130" height="58"/><rect class="cell on3" x="560" y="230" width="130" height="58"/><rect class="cell on4" x="690" y="230" width="130" height="58"/><rect class="cell on5" x="820" y="230" width="300" height="58"/>
    <text class="muted" x="325" y="266" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">明确指令</text><text class="muted" x="455" y="266" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">带上下文</text><text class="muted" x="585" y="266" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">目标拆解</text><text class="muted" x="715" y="266" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">动态澄清</text><text class="muted" x="850" y="266" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">长期目标</text>

    <rect class="cell" x="80" y="288" width="220" height="58"/><text class="ink" x="112" y="324" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">规划能力</text>
    <rect class="cell" x="300" y="288" width="130" height="58"/><rect class="cell on2" x="430" y="288" width="130" height="58"/><rect class="cell on3" x="560" y="288" width="130" height="58"/><rect class="cell on4" x="690" y="288" width="130" height="58"/><rect class="cell on5" x="820" y="288" width="300" height="58"/>
    <text class="muted" x="455" y="324" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">单步选择</text><text class="muted" x="585" y="324" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">多步计划</text><text class="muted" x="715" y="324" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">计划修正</text><text class="muted" x="850" y="324" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">项目管理</text>

    <rect class="cell" x="80" y="346" width="220" height="58"/><text class="ink" x="112" y="382" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">工具调用</text>
    <rect class="cell" x="300" y="346" width="130" height="58"/><rect class="cell on2" x="430" y="346" width="130" height="58"/><rect class="cell on3" x="560" y="346" width="130" height="58"/><rect class="cell on4" x="690" y="346" width="130" height="58"/><rect class="cell on5" x="820" y="346" width="300" height="58"/>
    <text class="muted" x="455" y="382" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">可调用</text><text class="muted" x="585" y="382" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">会组合</text><text class="muted" x="715" y="382" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">会恢复</text><text class="muted" x="850" y="382" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">资源调度</text>

    <rect class="cell" x="80" y="404" width="220" height="58"/><text class="ink" x="112" y="440" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">记忆沉淀</text>
    <rect class="cell" x="300" y="404" width="130" height="58"/><rect class="cell" x="430" y="404" width="130" height="58"/><rect class="cell on3" x="560" y="404" width="130" height="58"/><rect class="cell on4" x="690" y="404" width="130" height="58"/><rect class="cell on5" x="820" y="404" width="300" height="58"/>
    <text class="muted" x="585" y="440" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">短期状态</text><text class="muted" x="715" y="440" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">经验复用</text><text class="muted" x="850" y="440" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">组织知识</text>

    <rect class="cell" x="80" y="462" width="220" height="58"/><text class="ink" x="112" y="498" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">反馈闭环</text>
    <rect class="cell" x="300" y="462" width="130" height="58"/><rect class="cell" x="430" y="462" width="130" height="58"/><rect class="cell on3" x="560" y="462" width="130" height="58"/><rect class="cell on4" x="690" y="462" width="130" height="58"/><rect class="cell on5" x="820" y="462" width="300" height="58"/>
    <text class="muted" x="585" y="498" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">可检查</text><text class="muted" x="715" y="498" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">可复跑</text><text class="muted" x="850" y="498" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif">持续优化</text>
  </g>
</svg>
