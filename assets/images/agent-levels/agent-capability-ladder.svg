<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent 能力分级 L0-L5</title>
  <desc id="desc">从工具自动化到自演化智能体的六级能力阶梯，能力、自治和风险从左下向右上增加。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1f7a8c"/>
      <stop offset="52%" stop-color="#3d7dd8"/>
      <stop offset="100%" stop-color="#7a4cc2"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',Arial,sans-serif">
    <text x="70" y="84" font-size="38" font-weight="700" fill="#172033">AI Agent 能力分级：L0-L5</text>
    <text x="72" y="124" font-size="20" fill="#526173">越往上，智能体越能理解目标、拆解任务、调用工具、处理异常并沉淀经验</text>

    <g transform="translate(72 184)" filter="url(#shadow)">
      <rect x="0" y="420" width="1010" height="72" rx="8" fill="#d8e1ea"/>
      <rect x="0" y="340" width="860" height="72" rx="8" fill="#b8d4df"/>
      <rect x="0" y="260" width="710" height="72" rx="8" fill="#8fc5d7"/>
      <rect x="0" y="180" width="560" height="72" rx="8" fill="#6ab3ce"/>
      <rect x="0" y="100" width="410" height="72" rx="8" fill="#5f92d5"/>
      <rect x="0" y="20" width="260" height="72" rx="8" fill="#7657c8"/>
    </g>

    <g transform="translate(72 184)" fill="#172033">
      <text x="24" y="467" font-size="28" font-weight="700">L0 工具自动化</text>
      <text x="230" y="467" font-size="19" fill="#526173">固定脚本、规则流程，人做判断，系统只执行明确命令</text>

      <text x="24" y="387" font-size="28" font-weight="700">L1 对话助手</text>
      <text x="230" y="387" font-size="19" fill="#526173">理解自然语言请求，生成内容或建议，但不独立行动</text>

      <text x="24" y="307" font-size="28" font-weight="700">L2 工具调用</text>
      <text x="230" y="307" font-size="19" fill="#526173">在授权范围内检索、计算、调用 API，完成局部任务</text>

      <text x="24" y="227" font-size="28" font-weight="700">L3 任务执行</text>
      <text x="230" y="227" font-size="19" fill="#526173">能拆解目标、规划步骤、迭代执行，中间节点需要人工校验</text>

      <text x="24" y="147" font-size="28" font-weight="700">L4 领域自治</text>
      <text x="230" y="147" font-size="19" fill="#526173">在清晰边界内自主监控、修正、协同多个工具或子智能体</text>

      <text x="24" y="67" font-size="28" font-weight="700" fill="#ffffff">L5 自演化系统</text>
      <text x="230" y="67" font-size="19" fill="#f2efff">能提出子目标、重构流程、沉淀策略；现实中仍应视为研究目标</text>
    </g>

    <g transform="translate(910 92)">
      <path d="M0 500 C80 370 130 220 155 40" fill="none" stroke="url(#bar)" stroke-width="8" stroke-linecap="round"/>
      <path d="M151 38 L174 78 L132 70 Z" fill="#7a4cc2"/>
      <text x="54" y="350" transform="rotate(-67 54 350)" font-size="20" font-weight="700" fill="#334155">自治程度上升</text>
      <text x="94" y="401" transform="rotate(-67 94 401)" font-size="17" fill="#64748b">风险与治理要求同步上升</text>
    </g>

    <g transform="translate(72 690)">
      <rect x="0" y="-36" width="1020" height="52" rx="8" fill="#ffffff" stroke="#d5dde8"/>
      <text x="24" y="-4" font-size="18" fill="#526173">判断一个 Agent 的等级，不看它说得多像人，而看它能否在明确边界内稳定地“感知-计划-行动-反馈-改进”。</text>
    </g>
  </g>
</svg>
