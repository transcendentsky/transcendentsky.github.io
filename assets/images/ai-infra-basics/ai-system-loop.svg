<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">AI system lifecycle loop</title>
  <desc id="desc">A loop showing data, training, evaluation, deployment, monitoring, and feedback.</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 Z" fill="#5b6976"/>
    </marker>
    <filter id="shadow" x="-15%" y="-30%" width="130%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#17324d" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1180" height="640" rx="28" fill="#f6f8fb"/>
  <text x="590" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17324d">AI 系统的工程闭环</text>
  <text x="590" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#607080">AI infra 的目标，是让数据、模型和线上反馈持续流动</text>

  <g stroke="#5b6976" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M300 230 C405 135 775 135 880 230"/>
    <path d="M950 325 C920 480 725 530 590 490"/>
    <path d="M510 490 C375 530 180 480 230 325"/>
    <path d="M325 315 H485"/>
    <path d="M695 315 H850"/>
  </g>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="105" y="205" width="220" height="120" rx="18" fill="#ffffff"/>
    <text x="215" y="247" text-anchor="middle" font-size="22" font-weight="700" fill="#f2994a">Data</text>
    <text x="215" y="278" text-anchor="middle" font-size="15" fill="#536170">采集、清洗、标注</text>
    <text x="215" y="301" text-anchor="middle" font-size="15" fill="#536170">版本与血缘</text>

    <rect x="480" y="165" width="220" height="120" rx="18" fill="#ffffff"/>
    <text x="590" y="207" text-anchor="middle" font-size="22" font-weight="700" fill="#b25cff">Train</text>
    <text x="590" y="238" text-anchor="middle" font-size="15" fill="#536170">预训练 / 微调 / RL</text>
    <text x="590" y="261" text-anchor="middle" font-size="15" fill="#536170">实验追踪</text>

    <rect x="855" y="205" width="220" height="120" rx="18" fill="#ffffff"/>
    <text x="965" y="247" text-anchor="middle" font-size="22" font-weight="700" fill="#2f80ed">Evaluate</text>
    <text x="965" y="278" text-anchor="middle" font-size="15" fill="#536170">Benchmark / 红队</text>
    <text x="965" y="301" text-anchor="middle" font-size="15" fill="#536170">质量门禁</text>

    <rect x="480" y="430" width="220" height="120" rx="18" fill="#ffffff"/>
    <text x="590" y="472" text-anchor="middle" font-size="22" font-weight="700" fill="#00a878">Deploy</text>
    <text x="590" y="503" text-anchor="middle" font-size="15" fill="#536170">Serving / 灰度 / 回滚</text>
    <text x="590" y="526" text-anchor="middle" font-size="15" fill="#536170">监控与反馈</text>

    <rect x="490" y="300" width="200" height="78" rx="18" fill="#17324d"/>
    <text x="590" y="333" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">Feedback</text>
    <text x="590" y="358" text-anchor="middle" font-size="14" fill="#cfe2ee">日志、人工纠错、偏好数据</text>
  </g>
</svg>
