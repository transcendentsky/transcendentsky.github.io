<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="680" viewBox="0 0 1180 680" role="img" aria-labelledby="title desc">
  <title id="title">AI infra map</title>
  <desc id="desc">A layered map of AI infrastructure, covering compute, data, training, model management, inference, evaluation, monitoring, and applications.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#f6fbf7"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-20%" width="116%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#17324d" flood-opacity=".13"/>
    </filter>
  </defs>
  <rect width="1180" height="680" rx="28" fill="url(#bg)"/>
  <text x="590" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17324d">AI Infra 基础能力地图</text>
  <text x="590" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#607080">把模型从研究代码变成可训练、可部署、可观测、可持续迭代的系统</text>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="120" y="130" width="940" height="72" rx="18" fill="#17324d"/>
    <text x="590" y="174" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">应用层：Chatbot / Agent / Copilot / 搜索 / 推荐 / 多模态产品</text>

    <rect x="120" y="225" width="940" height="72" rx="18" fill="#ffffff"/>
    <text x="245" y="268" text-anchor="middle" font-size="21" font-weight="700" fill="#2f80ed">推理服务</text>
    <text x="493" y="268" text-anchor="middle" font-size="18" fill="#536170">Serving / Batch / Streaming / Router</text>
    <text x="875" y="268" text-anchor="middle" font-size="18" fill="#536170">延迟、吞吐、成本</text>

    <rect x="120" y="320" width="940" height="72" rx="18" fill="#ffffff"/>
    <text x="245" y="363" text-anchor="middle" font-size="21" font-weight="700" fill="#00a878">模型层</text>
    <text x="493" y="363" text-anchor="middle" font-size="18" fill="#536170">Checkpoint / Registry / Adapter / Prompt</text>
    <text x="875" y="363" text-anchor="middle" font-size="18" fill="#536170">版本、权限、回滚</text>

    <rect x="120" y="415" width="940" height="72" rx="18" fill="#ffffff"/>
    <text x="245" y="458" text-anchor="middle" font-size="21" font-weight="700" fill="#b25cff">训练层</text>
    <text x="493" y="458" text-anchor="middle" font-size="18" fill="#536170">Pretrain / SFT / RLHF / Fine-tune</text>
    <text x="875" y="458" text-anchor="middle" font-size="18" fill="#536170">GPU、并行、容错</text>

    <rect x="120" y="510" width="940" height="72" rx="18" fill="#ffffff"/>
    <text x="245" y="553" text-anchor="middle" font-size="21" font-weight="700" fill="#f2994a">数据层</text>
    <text x="493" y="553" text-anchor="middle" font-size="18" fill="#536170">Data Lake / Feature / Vector DB / Label</text>
    <text x="875" y="553" text-anchor="middle" font-size="18" fill="#536170">质量、血缘、合规</text>

    <rect x="120" y="605" width="940" height="48" rx="18" fill="#eaf0f6"/>
    <text x="590" y="636" text-anchor="middle" font-size="20" font-weight="700" fill="#17324d">基础设施层：GPU / CPU / Storage / Network / Kubernetes / Scheduler / Observability</text>
  </g>
</svg>
