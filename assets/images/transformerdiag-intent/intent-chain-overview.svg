<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="680" viewBox="0 0 1180 680" role="img" aria-labelledby="title desc">
  <title id="title">TransformerDiag intent recognition chain overview</title>
  <desc id="desc">End-to-end chain from SSE request, query rewriting, intent recognition, DST context, UniQA routing, tool calls, and streamed answer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#f5faf6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#17324d" flood-opacity=".15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#5b6976"/>
    </marker>
  </defs>
  <rect width="1180" height="680" rx="28" fill="url(#bg)"/>
  <text x="590" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17324d">TransformerDiag 意图识别主链路</text>
  <text x="590" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#607080">从用户问题到 UniQA 流式回答：改写、分类、状态管理、工具路由和兜底</text>

  <g stroke="#5b6976" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M210 202 H318"/>
    <path d="M496 202 H604"/>
    <path d="M782 202 H890"/>
    <path d="M1010 252 C1010 330 915 350 815 350"/>
    <path d="M660 350 H548"/>
    <path d="M402 350 H305"/>
    <path d="M220 398 C220 485 335 512 440 512"/>
    <path d="M665 512 H795"/>
    <path d="M930 512 C1010 512 1034 458 1034 390"/>
  </g>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="60" y="150" width="150" height="104" rx="16" fill="#ffffff"/>
    <text x="135" y="187" text-anchor="middle" font-size="20" font-weight="700" fill="#2f80ed">SSE 请求</text>
    <text x="135" y="217" text-anchor="middle" font-size="14" fill="#536170">intent-recognition</text>
    <text x="135" y="239" text-anchor="middle" font-size="14" fill="#536170">stream</text>

    <rect x="318" y="150" width="178" height="104" rx="16" fill="#ffffff"/>
    <text x="407" y="187" text-anchor="middle" font-size="20" font-weight="700" fill="#00a878">输入治理</text>
    <text x="407" y="217" text-anchor="middle" font-size="14" fill="#536170">cleaned_input</text>
    <text x="407" y="239" text-anchor="middle" font-size="14" fill="#536170">ctxopt 改写</text>

    <rect x="604" y="150" width="178" height="104" rx="16" fill="#ffffff"/>
    <text x="693" y="187" text-anchor="middle" font-size="20" font-weight="700" fill="#b25cff">硬意图识别</text>
    <text x="693" y="217" text-anchor="middle" font-size="14" fill="#536170">LLM + 规则</text>
    <text x="693" y="239" text-anchor="middle" font-size="14" fill="#536170">四要素判定</text>

    <rect x="890" y="150" width="170" height="104" rx="16" fill="#ffffff"/>
    <text x="975" y="187" text-anchor="middle" font-size="20" font-weight="700" fill="#f2994a">DST/Context</text>
    <text x="975" y="217" text-anchor="middle" font-size="14" fill="#536170">设备继承</text>
    <text x="975" y="239" text-anchor="middle" font-size="14" fill="#536170">槽位沉淀</text>

    <rect x="660" y="298" width="155" height="104" rx="16" fill="#ffffff"/>
    <text x="738" y="335" text-anchor="middle" font-size="20" font-weight="700" fill="#17324d">UniQA</text>
    <text x="738" y="365" text-anchor="middle" font-size="14" fill="#536170">统一编排</text>
    <text x="738" y="387" text-anchor="middle" font-size="14" fill="#536170">prompt 构建</text>

    <rect x="372" y="298" width="176" height="104" rx="16" fill="#ffffff"/>
    <text x="460" y="335" text-anchor="middle" font-size="20" font-weight="700" fill="#2f80ed">工具调用</text>
    <text x="460" y="365" text-anchor="middle" font-size="14" fill="#536170">knowledge_tool</text>
    <text x="460" y="387" text-anchor="middle" font-size="14" fill="#536170">test / defect / risk</text>

    <rect x="110" y="298" width="195" height="104" rx="16" fill="#ffffff"/>
    <text x="208" y="335" text-anchor="middle" font-size="20" font-weight="700" fill="#00a878">SSE 输出</text>
    <text x="208" y="365" text-anchor="middle" font-size="14" fill="#536170">chunk</text>
    <text x="208" y="387" text-anchor="middle" font-size="14" fill="#536170">test_qa_result</text>

    <rect x="440" y="460" width="225" height="104" rx="16" fill="#ffffff"/>
    <text x="553" y="497" text-anchor="middle" font-size="20" font-weight="700" fill="#b25cff">PG 会话历史</text>
    <text x="553" y="527" text-anchor="middle" font-size="14" fill="#536170">最近三轮辅助识别</text>
    <text x="553" y="549" text-anchor="middle" font-size="14" fill="#536170">回答完成后更新</text>

    <rect x="795" y="460" width="225" height="104" rx="16" fill="#ffffff"/>
    <text x="908" y="497" text-anchor="middle" font-size="20" font-weight="700" fill="#f2994a">ctxopt 存储</text>
    <text x="908" y="527" text-anchor="middle" font-size="14" fill="#536170">后台异步写入</text>
    <text x="908" y="549" text-anchor="middle" font-size="14" fill="#536170">不阻塞流式响应</text>
  </g>
</svg>
