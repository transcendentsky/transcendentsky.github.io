<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">TransformerDiag hard mode intent matrix</title>
  <desc id="desc">A matrix showing hard mode conditions for test result interpretation, defect hazard, unified QA, and unknown intent.</desc>
  <rect width="1180" height="620" rx="28" fill="#fbfaf6"/>
  <text x="590" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17324d">硬模式意图判定矩阵</text>
  <text x="590" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#607080">严格区分“需要专业工具执行”的硬意图与“普通技术问答”</text>

  <g font-family="Arial, sans-serif">
    <rect x="80" y="130" width="1020" height="70" rx="14" fill="#17324d"/>
    <text x="130" y="174" font-size="18" font-weight="700" fill="#ffffff">意图类型</text>
    <text x="370" y="174" font-size="18" font-weight="700" fill="#ffffff">成立条件</text>
    <text x="760" y="174" font-size="18" font-weight="700" fill="#ffffff">否决条件</text>

    <rect x="80" y="210" width="1020" height="88" rx="12" fill="#ffffff" stroke="#d9e6ef"/>
    <circle cx="124" cy="254" r="15" fill="#2f80ed"/>
    <text x="153" y="250" font-size="18" font-weight="700" fill="#17324d">试验结果解读</text>
    <text x="153" y="274" font-size="14" fill="#536170">硬模式</text>
    <text x="370" y="246" font-size="15" fill="#334">站名 + 主变编号 + 具体试验项目 + 明确数值</text>
    <text x="370" y="273" font-size="15" fill="#334">用户要求判断、分析、评价该试验结果</text>
    <text x="760" y="246" font-size="15" fill="#334">缺任一要素；只问标准、方法、历史趋势</text>
    <text x="760" y="273" font-size="15" fill="#334">只有“异常/不合格”但没有数值</text>

    <rect x="80" y="310" width="1020" height="88" rx="12" fill="#ffffff" stroke="#d9e6ef"/>
    <circle cx="124" cy="354" r="15" fill="#f2994a"/>
    <text x="153" y="350" font-size="18" font-weight="700" fill="#17324d">缺陷隐患</text>
    <text x="153" y="374" font-size="14" fill="#536170">硬模式</text>
    <text x="370" y="346" font-size="15" fill="#334">具体设备 + 可感知状态/现象 + 缺陷/隐患/故障关键词</text>
    <text x="370" y="373" font-size="15" fill="#334">问题进入判断依据、处置方式或工程决策层</text>
    <text x="760" y="346" font-size="15" fill="#334">只问概念归类；只列案例；没有现象描述</text>
    <text x="760" y="373" font-size="15" fill="#334">只讨论试验是否异常，主语义不在缺陷处置</text>

    <rect x="80" y="410" width="1020" height="78" rx="12" fill="#ffffff" stroke="#d9e6ef"/>
    <circle cx="124" cy="449" r="15" fill="#00a878"/>
    <text x="153" y="445" font-size="18" font-weight="700" fill="#17324d">统一问答</text>
    <text x="153" y="469" font-size="14" fill="#536170">非硬模式</text>
    <text x="370" y="445" font-size="15" fill="#334">电力变压器相关技术、规范、原理、运维经验</text>
    <text x="370" y="470" font-size="15" fill="#334">硬模式要素不完整，仍可作为技术问答回答</text>
    <text x="760" y="458" font-size="15" fill="#334">非电力问题则不进入该类</text>

    <rect x="80" y="500" width="1020" height="70" rx="12" fill="#ffffff" stroke="#d9e6ef"/>
    <circle cx="124" cy="535" r="15" fill="#8792a2"/>
    <text x="153" y="531" font-size="18" font-weight="700" fill="#17324d">未知意图</text>
    <text x="153" y="555" font-size="14" fill="#536170">边界兜底</text>
    <text x="370" y="545" font-size="15" fill="#334">闲聊、身份询问、采购商务、非变压器技术问题</text>
    <text x="760" y="545" font-size="15" fill="#334">不进入 UniQA 主回答，输出固定引导</text>
  </g>
</svg>
