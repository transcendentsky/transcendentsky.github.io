<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">TransformerDiag state and memory loop</title>
  <desc id="desc">DST, Context, PostgreSQL history, ctxopt, and UniQA form a state and memory loop.</desc>
  <defs>
    <filter id="shadow" x="-15%" y="-25%" width="130%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#17324d" flood-opacity=".14"/>
    </filter>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 Z" fill="#5b6976"/>
    </marker>
  </defs>
  <rect width="1180" height="620" rx="28" fill="#f6f8fb"/>
  <text x="590" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17324d">状态、槽位与记忆闭环</text>
  <text x="590" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#607080">TransformerDiag 的意图识别不是一次性分类，而是跨轮次维护工程上下文</text>

  <g stroke="#5b6976" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M295 230 C420 130 760 130 885 230"/>
    <path d="M940 328 C902 468 720 515 590 476"/>
    <path d="M515 476 C385 515 205 468 240 328"/>
    <path d="M315 324 H490"/>
    <path d="M690 324 H865"/>
  </g>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="120" y="205" width="210" height="126" rx="18" fill="#ffffff"/>
    <text x="225" y="248" text-anchor="middle" font-size="22" font-weight="700" fill="#2f80ed">Context</text>
    <text x="225" y="279" text-anchor="middle" font-size="15" fill="#536170">original_input</text>
    <text x="225" y="303" text-anchor="middle" font-size="15" fill="#536170">rewritten user_input</text>

    <rect x="485" y="165" width="210" height="126" rx="18" fill="#ffffff"/>
    <text x="590" y="208" text-anchor="middle" font-size="22" font-weight="700" fill="#00a878">DST</text>
    <text x="590" y="239" text-anchor="middle" font-size="15" fill="#536170">transformer_id</text>
    <text x="590" y="263" text-anchor="middle" font-size="15" fill="#536170">current_intent</text>

    <rect x="850" y="205" width="210" height="126" rx="18" fill="#ffffff"/>
    <text x="955" y="248" text-anchor="middle" font-size="22" font-weight="700" fill="#b25cff">Slots</text>
    <text x="955" y="279" text-anchor="middle" font-size="15" fill="#536170">test_name / metric</text>
    <text x="955" y="303" text-anchor="middle" font-size="15" fill="#536170">period / trip_time</text>

    <rect x="475" y="405" width="230" height="126" rx="18" fill="#ffffff"/>
    <text x="590" y="448" text-anchor="middle" font-size="22" font-weight="700" fill="#f2994a">PG History</text>
    <text x="590" y="479" text-anchor="middle" font-size="15" fill="#536170">用户问题与 assistant</text>
    <text x="590" y="503" text-anchor="middle" font-size="15" fill="#536170">最多三轮辅助识别</text>

    <rect x="490" y="302" width="200" height="70" rx="16" fill="#17324d"/>
    <text x="590" y="344" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">UniQA Prompt</text>
  </g>
</svg>
