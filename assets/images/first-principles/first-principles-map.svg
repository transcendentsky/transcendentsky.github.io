<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">第一性原理思考路径图</title>
  <desc id="desc">从经验类比进入拆解、约束、重组和验证的第一性原理流程。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 34px sans-serif;fill:#111827}.subtitle{font:400 17px sans-serif;fill:#475569}.card{fill:#ffffff;stroke:#dbe3ef;stroke-width:1.4;filter:url(#shadow)}.label{font:700 22px sans-serif;fill:#111827}.body{font:400 15px sans-serif;fill:#334155}.small{font:600 14px sans-serif;fill:#475569}.pill{font:700 15px sans-serif;fill:#ffffff}.line{stroke:#475569;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.accent-blue{fill:#2563eb}.accent-green{fill:#059669}.accent-amber{fill:#d97706}.accent-red{fill:#dc2626}.accent-slate{fill:#475569}.soft-blue{fill:#dbeafe}.soft-green{fill:#dcfce7}.soft-amber{fill:#fef3c7}.soft-red{fill:#fee2e2}.soft-slate{fill:#e2e8f0}
    </style>
  </defs>
  <rect class="bg" width="1120" height="620" rx="0"/>
  <text x="60" y="70" class="title">第一性原理：把问题拆到不可再拆，再重新构造</text>
  <text x="60" y="104" class="subtitle">不是反经验，而是先识别经验里的假设，再回到事实、约束和目标本身。</text>

  <rect x="60" y="155" width="205" height="170" rx="10" class="card"/>
  <circle cx="96" cy="195" r="18" class="soft-slate"/>
  <text x="91" y="201" class="small">0</text>
  <text x="118" y="202" class="label">经验类比</text>
  <text x="86" y="238" class="body">别人怎么做？</text>
  <text x="86" y="263" class="body">行业默认是什么？</text>
  <text x="86" y="288" class="body">过去为什么有效？</text>
  <rect x="86" y="338" width="134" height="30" rx="15" class="accent-slate"/>
  <text x="105" y="358" class="pill">识别隐含假设</text>

  <path d="M275 240 C310 240, 315 240, 348 240" class="line"/>

  <rect x="360" y="140" width="220" height="205" rx="10" class="card"/>
  <circle cx="396" cy="180" r="18" class="soft-red"/>
  <text x="391" y="186" class="small">1</text>
  <text x="418" y="187" class="label">拆解问题</text>
  <text x="386" y="225" class="body">目标是什么？</text>
  <text x="386" y="250" class="body">变量有哪些？</text>
  <text x="386" y="275" class="body">哪些是事实？</text>
  <text x="386" y="300" class="body">哪些只是惯例？</text>
  <rect x="386" y="365" width="145" height="30" rx="15" class="accent-red"/>
  <text x="408" y="385" class="pill">拆到基本单元</text>

  <path d="M590 240 C625 240, 630 240, 663 240" class="line"/>

  <rect x="675" y="140" width="220" height="205" rx="10" class="card"/>
  <circle cx="711" cy="180" r="18" class="soft-blue"/>
  <text x="706" y="186" class="small">2</text>
  <text x="733" y="187" class="label">寻找约束</text>
  <text x="701" y="225" class="body">物理上能否成立？</text>
  <text x="701" y="250" class="body">经济上是否可行？</text>
  <text x="701" y="275" class="body">时间和资源边界？</text>
  <text x="701" y="300" class="body">不能违反什么？</text>
  <rect x="701" y="365" width="145" height="30" rx="15" class="accent-blue"/>
  <text x="723" y="385" class="pill">保留硬约束</text>

  <path d="M785 356 C785 420, 657 443, 567 443" class="line"/>

  <rect x="340" y="410" width="260" height="145" rx="10" class="card"/>
  <circle cx="376" cy="450" r="18" class="soft-green"/>
  <text x="371" y="456" class="small">3</text>
  <text x="398" y="457" class="label">重新构造方案</text>
  <text x="366" y="495" class="body">从事实和约束出发</text>
  <text x="366" y="520" class="body">尝试新组合、新路径、新指标</text>
  <rect x="366" y="575" width="145" height="30" rx="15" class="accent-green"/>
  <text x="388" y="595" class="pill">生成候选解</text>

  <path d="M610 482 C680 482, 715 482, 778 482" class="line"/>

  <rect x="790" y="410" width="260" height="145" rx="10" class="card"/>
  <circle cx="826" cy="450" r="18" class="soft-amber"/>
  <text x="821" y="456" class="small">4</text>
  <text x="848" y="457" class="label">实验验证</text>
  <text x="816" y="495" class="body">小实验、最小原型、数据反馈</text>
  <text x="816" y="520" class="body">失败后回到假设和约束</text>
  <rect x="816" y="575" width="132" height="30" rx="15" class="accent-amber"/>
  <text x="839" y="595" class="pill">证伪或迭代</text>

  <path d="M920 402 C930 330, 923 302, 900 274" class="line"/>
</svg>
