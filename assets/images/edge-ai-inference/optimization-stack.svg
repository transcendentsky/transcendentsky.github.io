<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="660" viewBox="0 0 1180 660" role="img" aria-labelledby="title desc">
  <title id="title">Edge AI inference optimization stack</title>
  <desc id="desc">A layered stack of edge inference optimization techniques, from model, operator, runtime, memory, system, and product strategy.</desc>
  <rect width="1180" height="660" rx="28" fill="#fbfaf6"/>
  <text x="590" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17324d">端侧推理优化分层栈</text>
  <text x="590" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#607080">模型变小、算子变快、内存变省、系统变稳，缺一不可</text>

  <g font-family="Arial, sans-serif">
    <rect x="120" y="135" width="940" height="70" rx="18" fill="#17324d"/>
    <text x="245" y="178" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">产品策略</text>
    <text x="650" y="178" text-anchor="middle" font-size="18" fill="#ffffff">按场景降级、云边协同、缓存、异步化、质量门槛</text>

    <rect x="120" y="225" width="940" height="70" rx="18" fill="#ffffff" stroke="#dce7ef"/>
    <text x="245" y="268" text-anchor="middle" font-size="21" font-weight="700" fill="#2f80ed">系统层</text>
    <text x="650" y="268" text-anchor="middle" font-size="18" fill="#536170">线程池、大小核调度、功耗控制、I/O 与预处理流水线</text>

    <rect x="120" y="315" width="940" height="70" rx="18" fill="#ffffff" stroke="#dce7ef"/>
    <text x="245" y="358" text-anchor="middle" font-size="21" font-weight="700" fill="#00a878">Runtime 层</text>
    <text x="650" y="358" text-anchor="middle" font-size="18" fill="#536170">图优化、算子融合、内存复用、Delegate、Kernel 选择</text>

    <rect x="120" y="405" width="940" height="70" rx="18" fill="#ffffff" stroke="#dce7ef"/>
    <text x="245" y="448" text-anchor="middle" font-size="21" font-weight="700" fill="#b25cff">模型层</text>
    <text x="650" y="448" text-anchor="middle" font-size="18" fill="#536170">量化、蒸馏、剪枝、稀疏、低秩、架构替换</text>

    <rect x="120" y="495" width="940" height="70" rx="18" fill="#ffffff" stroke="#dce7ef"/>
    <text x="245" y="538" text-anchor="middle" font-size="21" font-weight="700" fill="#f2994a">数据与评测层</text>
    <text x="650" y="538" text-anchor="middle" font-size="18" fill="#536170">校准集、端侧 benchmark、退化样本、A/B 与遥测</text>
  </g>
</svg>
