<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="660" viewBox="0 0 1180 660" role="img" aria-labelledby="title desc">
  <title id="title">Medical LLM reinforcement learning pipeline</title>
  <desc id="desc">A pipeline from pretraining, medical supervised fine-tuning, preference data, reward model or verifier, reinforcement learning, and clinical evaluation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#f8fff8"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-25%" width="124%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#17324d" flood-opacity=".15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#5f6f7d"/>
    </marker>
  </defs>
  <rect width="1180" height="660" rx="28" fill="url(#bg)"/>
  <text x="590" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17324d">医疗大模型的 RL 对齐流水线</text>
  <text x="590" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#607080">从“会说医学知识”到“按临床安全边界回答”</text>

  <g stroke="#5f6f7d" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M205 255 H300"/>
    <path d="M455 255 H550"/>
    <path d="M705 255 H800"/>
    <path d="M895 315 C895 385 770 415 650 415"/>
    <path d="M530 415 H395"/>
    <path d="M590 475 V530"/>
  </g>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="70" y="195" width="135" height="120" rx="18" fill="#ffffff"/>
    <text x="138" y="237" text-anchor="middle" font-size="20" font-weight="700" fill="#2f80ed">预训练</text>
    <text x="138" y="268" text-anchor="middle" font-size="14" fill="#536170">通用语言能力</text>
    <text x="138" y="291" text-anchor="middle" font-size="14" fill="#536170">基础医学知识</text>

    <rect x="300" y="195" width="155" height="120" rx="18" fill="#ffffff"/>
    <text x="378" y="237" text-anchor="middle" font-size="20" font-weight="700" fill="#00a878">医学 SFT</text>
    <text x="378" y="268" text-anchor="middle" font-size="14" fill="#536170">指南 / 教材 / QA</text>
    <text x="378" y="291" text-anchor="middle" font-size="14" fill="#536170">学习回答格式</text>

    <rect x="550" y="195" width="155" height="120" rx="18" fill="#ffffff"/>
    <text x="628" y="237" text-anchor="middle" font-size="20" font-weight="700" fill="#b25cff">偏好数据</text>
    <text x="628" y="268" text-anchor="middle" font-size="14" fill="#536170">医生排序</text>
    <text x="628" y="291" text-anchor="middle" font-size="14" fill="#536170">安全标注</text>

    <rect x="800" y="195" width="185" height="120" rx="18" fill="#ffffff"/>
    <text x="893" y="237" text-anchor="middle" font-size="20" font-weight="700" fill="#f2994a">奖励信号</text>
    <text x="893" y="268" text-anchor="middle" font-size="14" fill="#536170">Reward Model</text>
    <text x="893" y="291" text-anchor="middle" font-size="14" fill="#536170">Verifier / DPO</text>

    <rect x="530" y="355" width="120" height="120" rx="18" fill="#17324d"/>
    <text x="590" y="399" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">RL</text>
    <text x="590" y="430" text-anchor="middle" font-size="14" fill="#cfe2ee">PPO / GRPO</text>
    <text x="590" y="453" text-anchor="middle" font-size="14" fill="#cfe2ee">策略优化</text>

    <rect x="210" y="355" width="185" height="120" rx="18" fill="#ffffff"/>
    <text x="303" y="399" text-anchor="middle" font-size="20" font-weight="700" fill="#2f80ed">安全约束</text>
    <text x="303" y="430" text-anchor="middle" font-size="14" fill="#536170">拒答 / 转诊</text>
    <text x="303" y="453" text-anchor="middle" font-size="14" fill="#536170">引用证据</text>

    <rect x="455" y="530" width="270" height="76" rx="18" fill="#ffffff"/>
    <text x="590" y="563" text-anchor="middle" font-size="20" font-weight="700" fill="#00a878">临床评估与上线监控</text>
    <text x="590" y="590" text-anchor="middle" font-size="14" fill="#536170">准确性、完整性、安全性、校准度、人工复核</text>
  </g>
</svg>
