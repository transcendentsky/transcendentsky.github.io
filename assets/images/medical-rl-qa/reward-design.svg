<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">Reward design for medical question answering</title>
  <desc id="desc">Reward components for medical QA: correctness, evidence, safety, uncertainty, empathy and structure.</desc>
  <rect width="1180" height="620" rx="28" fill="#fbfaf6"/>
  <text x="590" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17324d">医疗问答奖励函数应该奖励什么？</text>
  <text x="590" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#607080">不能只奖励“答得像医生”，还要奖励“证据、边界和不确定性”</text>

  <g font-family="Arial, sans-serif">
    <rect x="95" y="145" width="990" height="72" rx="16" fill="#17324d"/>
    <text x="145" y="190" font-size="18" font-weight="700" fill="#ffffff">奖励维度</text>
    <text x="380" y="190" font-size="18" font-weight="700" fill="#ffffff">正向奖励</text>
    <text x="770" y="190" font-size="18" font-weight="700" fill="#ffffff">负向惩罚</text>

    <rect x="95" y="232" width="990" height="62" rx="12" fill="#ffffff" stroke="#dde5ec"/>
    <text x="145" y="270" font-size="17" font-weight="700" fill="#2f80ed">医学正确性</text>
    <text x="380" y="270" font-size="15" fill="#334">符合指南、机制解释正确、结论不过度</text>
    <text x="770" y="270" font-size="15" fill="#334">事实错误、编造诊断、错误用药建议</text>

    <rect x="95" y="304" width="990" height="62" rx="12" fill="#ffffff" stroke="#dde5ec"/>
    <text x="145" y="342" font-size="17" font-weight="700" fill="#00a878">证据可追溯</text>
    <text x="380" y="342" font-size="15" fill="#334">引用指南、说明依据、区分事实与推断</text>
    <text x="770" y="342" font-size="15" fill="#334">伪造文献、无来源绝对化表达</text>

    <rect x="95" y="376" width="990" height="62" rx="12" fill="#ffffff" stroke="#dde5ec"/>
    <text x="145" y="414" font-size="17" font-weight="700" fill="#b25cff">安全边界</text>
    <text x="380" y="414" font-size="15" fill="#334">识别急症、建议就医、避免远程确诊</text>
    <text x="770" y="414" font-size="15" fill="#334">延误就医、鼓励自行停药或加药</text>

    <rect x="95" y="448" width="990" height="62" rx="12" fill="#ffffff" stroke="#dde5ec"/>
    <text x="145" y="486" font-size="17" font-weight="700" fill="#f2994a">不确定性</text>
    <text x="380" y="486" font-size="15" fill="#334">说明可能性、缺失信息、需要检查</text>
    <text x="770" y="486" font-size="15" fill="#334">过度自信、把筛查结论当确诊</text>

    <rect x="95" y="520" width="990" height="62" rx="12" fill="#ffffff" stroke="#dde5ec"/>
    <text x="145" y="558" font-size="17" font-weight="700" fill="#8792a2">沟通质量</text>
    <text x="380" y="558" font-size="15" fill="#334">清晰、同理、分层建议、可执行</text>
    <text x="770" y="558" font-size="15" fill="#334">吓唬患者、含糊、遗漏下一步行动</text>
  </g>
</svg>
