<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">LingBot family overview</title>
  <desc id="desc">LingBot-World, LingBot-VA, and LingBot-Map as three related world-model directions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef6f1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#17324d" flood-opacity=".16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4d6f83"/>
    </marker>
  </defs>
  <rect width="1120" height="620" rx="28" fill="url(#bg)"/>
  <text x="560" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17324d">LingBot：世界模型能力栈</text>
  <text x="560" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#607080">从生成未来画面，到驱动机器人控制，再到流式重建三维世界</text>

  <rect x="410" y="168" width="300" height="96" rx="22" fill="#17324d" filter="url(#shadow)"/>
  <text x="560" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#ffffff">World Model</text>
  <text x="560" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#cde3ee">预测环境如何随时间变化</text>

  <line x1="505" y1="268" x2="245" y2="360" stroke="#4d6f83" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="560" y1="270" x2="560" y2="356" stroke="#4d6f83" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="615" y1="268" x2="875" y2="360" stroke="#4d6f83" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="360" width="300" height="178" rx="20" fill="#ffffff"/>
    <rect x="70" y="360" width="300" height="58" rx="20" fill="#2f80ed"/>
    <text x="220" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">LingBot-World</text>
    <text x="98" y="452" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#17324d">交互式视频世界模拟器</text>
    <text x="98" y="483" font-family="Arial, sans-serif" font-size="15" fill="#4e6070">输入：图像、相机、动作条件</text>
    <text x="98" y="511" font-family="Arial, sans-serif" font-size="15" fill="#4e6070">输出：分钟级未来环境演化</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="410" y="360" width="300" height="178" rx="20" fill="#ffffff"/>
    <rect x="410" y="360" width="300" height="58" rx="20" fill="#00a878"/>
    <text x="560" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">LingBot-VA</text>
    <text x="438" y="452" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#17324d">视觉-动作联合世界模型</text>
    <text x="438" y="483" font-family="Arial, sans-serif" font-size="15" fill="#4e6070">输入：视频 token 与动作 token</text>
    <text x="438" y="511" font-family="Arial, sans-serif" font-size="15" fill="#4e6070">输出：预测画面与机器人动作</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="750" y="360" width="300" height="178" rx="20" fill="#ffffff"/>
    <rect x="750" y="360" width="300" height="58" rx="20" fill="#b25cff"/>
    <text x="900" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">LingBot-Map</text>
    <text x="778" y="452" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#17324d">流式 3D 重建基础模型</text>
    <text x="778" y="483" font-family="Arial, sans-serif" font-size="15" fill="#4e6070">输入：连续帧、相机位姿、记忆</text>
    <text x="778" y="511" font-family="Arial, sans-serif" font-size="15" fill="#4e6070">输出：在线更新的三维场景</text>
  </g>
</svg>
