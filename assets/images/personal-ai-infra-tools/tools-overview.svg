<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">个人 AI Infra 配套工具总览</title>
  <desc id="desc">展示 Chroma、FAISS、Prometheus、Grafana、Jupyter 和 Ollama 在个人 AI Infra 中的作用</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1080" height="560" rx="28" fill="url(#bg)"/>
  <text x="56" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">配套工具层：让个人 AI Infra 更完整</text>
  <text x="58" y="110" font-family="Arial, sans-serif" font-size="18" fill="#64748b">它们不是主干，但决定 RAG、监控、开发和模型试验是否顺手</text>
  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="90" y="175" width="190" height="110" rx="18" fill="#ffffff"/>
    <text x="185" y="216" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Chroma</text>
    <text x="185" y="248" text-anchor="middle" font-size="15" fill="#64748b">本地 RAG 向量库</text>

    <rect x="325" y="175" width="190" height="110" rx="18" fill="#ffffff"/>
    <text x="420" y="216" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">FAISS</text>
    <text x="420" y="248" text-anchor="middle" font-size="15" fill="#64748b">高性能向量索引</text>

    <rect x="560" y="175" width="190" height="110" rx="18" fill="#ffffff"/>
    <text x="655" y="216" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Prometheus</text>
    <text x="655" y="248" text-anchor="middle" font-size="15" fill="#64748b">采集指标</text>

    <rect x="795" y="175" width="190" height="110" rx="18" fill="#ffffff"/>
    <text x="890" y="216" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Grafana</text>
    <text x="890" y="248" text-anchor="middle" font-size="15" fill="#64748b">监控面板</text>

    <rect x="210" y="350" width="250" height="110" rx="18" fill="#ffffff"/>
    <text x="335" y="391" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Jupyter</text>
    <text x="335" y="423" text-anchor="middle" font-size="15" fill="#64748b">开发、分析、实验原型</text>

    <rect x="620" y="350" width="250" height="110" rx="18" fill="#ffffff"/>
    <text x="745" y="391" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Ollama</text>
    <text x="745" y="423" text-anchor="middle" font-size="15" fill="#64748b">快速拉起本地模型</text>
  </g>
  <text x="540" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">主干工具解决训练和推理，配套工具解决“能不能高效使用、观察和迭代”</text>
</svg>
