<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">个人 AI Infra 的推理服务层</title>
  <desc id="desc">展示应用、OpenAI 兼容 API、vLLM/LMDeploy、GPU KV Cache 和模型权重之间的关系</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9fbff"/>
      <stop offset="100%" stop-color="#eef7f4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1080" height="560" rx="28" fill="url(#bg)"/>
  <text x="56" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">推理服务层：把模型变成可调用的 API</text>
  <text x="58" y="110" font-family="Arial, sans-serif" font-size="18" fill="#64748b">LMDeploy / vLLM 负责高并发生成、KV Cache 管理、量化和 OpenAI 兼容接口</text>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="70" y="175" width="185" height="88" rx="16" fill="#ffffff"/>
    <text x="162" y="211" text-anchor="middle" font-size="20" font-weight="700" fill="#172033">应用入口</text>
    <text x="162" y="241" text-anchor="middle" font-size="15" fill="#5b6775">RAG / Agent / Web</text>

    <rect x="310" y="175" width="205" height="88" rx="16" fill="#ffffff"/>
    <text x="412" y="211" text-anchor="middle" font-size="20" font-weight="700" fill="#172033">OpenAI API</text>
    <text x="412" y="241" text-anchor="middle" font-size="15" fill="#5b6775">/v1/chat/completions</text>

    <rect x="570" y="145" width="220" height="148" rx="20" fill="#155e75"/>
    <text x="680" y="204" text-anchor="middle" font-size="27" font-weight="700" fill="#ffffff">推理引擎</text>
    <text x="680" y="240" text-anchor="middle" font-size="17" fill="#d9f8fb">vLLM / LMDeploy</text>
    <text x="680" y="265" text-anchor="middle" font-size="15" fill="#d9f8fb">batching / scheduler</text>

    <rect x="845" y="175" width="170" height="88" rx="16" fill="#ffffff"/>
    <text x="930" y="211" text-anchor="middle" font-size="20" font-weight="700" fill="#172033">GPU</text>
    <text x="930" y="241" text-anchor="middle" font-size="15" fill="#5b6775">权重 + KV Cache</text>
  </g>

  <path d="M255 219 H310" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>
  <path d="M515 219 H570" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>
  <path d="M790 219 H845" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>

  <g font-family="Arial, sans-serif">
    <rect x="104" y="365" width="190" height="58" rx="12" fill="#e0f2fe"/>
    <text x="199" y="401" text-anchor="middle" font-size="16" fill="#075985">低延迟首 token</text>
    <rect x="324" y="365" width="190" height="58" rx="12" fill="#dcfce7"/>
    <text x="419" y="401" text-anchor="middle" font-size="16" fill="#166534">吞吐与连续批处理</text>
    <rect x="544" y="365" width="190" height="58" rx="12" fill="#fef9c3"/>
    <text x="639" y="401" text-anchor="middle" font-size="16" fill="#854d0e">显存与 KV Cache</text>
    <rect x="764" y="365" width="190" height="58" rx="12" fill="#ede9fe"/>
    <text x="859" y="401" text-anchor="middle" font-size="16" fill="#5b21b6">量化与长上下文</text>
  </g>

  <text x="540" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">个人工作站选推理框架，核心不是“谁更强”，而是谁更适合你的模型、显卡、并发和调试习惯</text>
</svg>
