<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code 内网部署三种模式</title>
  <desc id="desc">展示离线二进制分发、内网 LLM 网关、本地模型服务三种部署模式</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#f3f7ed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1080" height="560" rx="28" fill="url(#bg)"/>
  <text x="56" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">Claude Code 内网部署：先区分三件事</text>
  <text x="58" y="110" font-family="Arial, sans-serif" font-size="18" fill="#64748b">CLI 分发、模型访问、权限审计是三个独立问题，不要混在一个脚本里解决</text>
  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="85" y="175" width="270" height="180" rx="22" fill="#ffffff"/>
    <text x="220" y="226" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">离线安装包</text>
    <text x="220" y="270" text-anchor="middle" font-size="16" fill="#64748b">公网机器下载</text>
    <text x="220" y="300" text-anchor="middle" font-size="16" fill="#64748b">校验 checksum</text>
    <text x="220" y="330" text-anchor="middle" font-size="16" fill="#64748b">内网共享分发</text>

    <rect x="405" y="175" width="270" height="180" rx="22" fill="#ffffff"/>
    <text x="540" y="226" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">LLM 网关</text>
    <text x="540" y="270" text-anchor="middle" font-size="16" fill="#64748b">ANTHROPIC_BASE_URL</text>
    <text x="540" y="300" text-anchor="middle" font-size="16" fill="#64748b">统一鉴权、审计、限流</text>
    <text x="540" y="330" text-anchor="middle" font-size="16" fill="#64748b">转发到云或私有模型</text>

    <rect x="725" y="175" width="270" height="180" rx="22" fill="#ffffff"/>
    <text x="860" y="226" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">本地模型</text>
    <text x="860" y="270" text-anchor="middle" font-size="16" fill="#64748b">Anthropic Messages API</text>
    <text x="860" y="300" text-anchor="middle" font-size="16" fill="#64748b">Ollama / LiteLLM / vLLM</text>
    <text x="860" y="330" text-anchor="middle" font-size="16" fill="#64748b">质量与工具调用需验证</text>
  </g>
  <text x="540" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">推荐顺序：先把 CLI 离线分发做好，再统一模型出口，最后评估是否需要完全本地推理</text>
</svg>
