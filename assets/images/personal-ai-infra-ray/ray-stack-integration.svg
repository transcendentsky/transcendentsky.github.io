<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="650" viewBox="0 0 1180 650" role="img" aria-labelledby="title desc">
  <title id="title">Ray integration with personal AI infra stack</title>
  <desc id="desc">Ray integrates with XTuner, MLflow, vLLM or LMDeploy, Chroma or FAISS, and Agent workers.</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-25%" width="124%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#17324d" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1180" height="650" rx="28" fill="#f6f8fb"/>
  <text x="590" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17324d">Ray 如何串起个人 AI Infra</text>
  <text x="590" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#607080">Ray 不替代工具，而是让工具按任务流和资源约束协同工作</text>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="430" y="155" width="320" height="105" rx="22" fill="#17324d"/>
    <text x="590" y="200" text-anchor="middle" font-size="25" font-weight="700" fill="#ffffff">Ray Orchestrator</text>
    <text x="590" y="232" text-anchor="middle" font-size="15" fill="#cfe2ee">Tasks / Actors / Resources / Queues</text>

    <rect x="90" y="330" width="220" height="118" rx="18" fill="#ffffff"/>
    <text x="200" y="373" text-anchor="middle" font-size="22" font-weight="700" fill="#b25cff">XTuner</text>
    <text x="200" y="405" text-anchor="middle" font-size="15" fill="#536170">微调任务</text>
    <text x="200" y="428" text-anchor="middle" font-size="15" fill="#536170">Ray Job 提交</text>

    <rect x="350" y="330" width="220" height="118" rx="18" fill="#ffffff"/>
    <text x="460" y="373" text-anchor="middle" font-size="22" font-weight="700" fill="#00a878">MLflow</text>
    <text x="460" y="405" text-anchor="middle" font-size="15" fill="#536170">实验记录</text>
    <text x="460" y="428" text-anchor="middle" font-size="15" fill="#536170">参数 / 指标 / 权重</text>

    <rect x="610" y="330" width="220" height="118" rx="18" fill="#ffffff"/>
    <text x="720" y="373" text-anchor="middle" font-size="22" font-weight="700" fill="#2f80ed">vLLM / LMDeploy</text>
    <text x="720" y="405" text-anchor="middle" font-size="15" fill="#536170">推理服务</text>
    <text x="720" y="428" text-anchor="middle" font-size="15" fill="#536170">常驻 Actor 或外部服务</text>

    <rect x="870" y="330" width="220" height="118" rx="18" fill="#ffffff"/>
    <text x="980" y="373" text-anchor="middle" font-size="22" font-weight="700" fill="#f2994a">RAG / Agent</text>
    <text x="980" y="405" text-anchor="middle" font-size="15" fill="#536170">并发 Worker</text>
    <text x="980" y="428" text-anchor="middle" font-size="15" fill="#536170">工具调用 / 检索</text>

    <path d="M510 260 L200 330" stroke="#5b6976" stroke-width="4" fill="none"/>
    <path d="M555 260 L460 330" stroke="#5b6976" stroke-width="4" fill="none"/>
    <path d="M625 260 L720 330" stroke="#5b6976" stroke-width="4" fill="none"/>
    <path d="M670 260 L980 330" stroke="#5b6976" stroke-width="4" fill="none"/>

    <rect x="225" y="525" width="730" height="58" rx="18" fill="#eaf0f6"/>
    <text x="590" y="562" text-anchor="middle" font-size="19" font-weight="700" fill="#17324d">一个原则：Ray 管“什么时候跑、用多少资源”；专业框架管“怎么训练、怎么推理”。</text>
  </g>
</svg>
