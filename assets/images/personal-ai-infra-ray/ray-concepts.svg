<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="680" viewBox="0 0 1180 680" role="img" aria-labelledby="title desc">
  <title id="title">Ray core concepts for personal AI infra</title>
  <desc id="desc">Ray core concepts: driver, tasks, actors, object store, scheduler, dashboard and resources.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#f7fff9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="145%">
      <feDropShadow dx="0" dy="9" stdDeviation="13" flood-color="#17324d" flood-opacity=".14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#5b6976"/>
    </marker>
  </defs>
  <rect width="1180" height="680" rx="28" fill="url(#bg)"/>
  <text x="590" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17324d">Ray 的几个核心概念</text>
  <text x="590" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#607080">把 Python 函数、常驻服务和资源声明变成可调度的 AI 工作流</text>

  <g stroke="#5b6976" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M260 240 H390"/>
    <path d="M590 240 H720"/>
    <path d="M590 390 H720"/>
    <path d="M460 300 V360"/>
    <path d="M815 300 V360"/>
  </g>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="95" y="185" width="165" height="110" rx="18" fill="#ffffff"/>
    <text x="178" y="226" text-anchor="middle" font-size="22" font-weight="700" fill="#2f80ed">Driver</text>
    <text x="178" y="258" text-anchor="middle" font-size="15" fill="#536170">你的 Python 主程序</text>
    <text x="178" y="281" text-anchor="middle" font-size="15" fill="#536170">提交任务</text>

    <rect x="390" y="185" width="200" height="110" rx="18" fill="#ffffff"/>
    <text x="490" y="226" text-anchor="middle" font-size="22" font-weight="700" fill="#00a878">Remote Task</text>
    <text x="490" y="258" text-anchor="middle" font-size="15" fill="#536170">一次性函数任务</text>
    <text x="490" y="281" text-anchor="middle" font-size="15" fill="#536170">批处理 / 评测</text>

    <rect x="720" y="185" width="220" height="110" rx="18" fill="#ffffff"/>
    <text x="830" y="226" text-anchor="middle" font-size="22" font-weight="700" fill="#b25cff">Actor</text>
    <text x="830" y="258" text-anchor="middle" font-size="15" fill="#536170">有状态常驻进程</text>
    <text x="830" y="281" text-anchor="middle" font-size="15" fill="#536170">模型 Worker / Agent</text>

    <rect x="360" y="360" width="230" height="110" rx="18" fill="#ffffff"/>
    <text x="475" y="401" text-anchor="middle" font-size="22" font-weight="700" fill="#f2994a">Object Store</text>
    <text x="475" y="433" text-anchor="middle" font-size="15" fill="#536170">跨任务共享对象</text>
    <text x="475" y="456" text-anchor="middle" font-size="15" fill="#536170">避免重复拷贝</text>

    <rect x="720" y="360" width="230" height="110" rx="18" fill="#ffffff"/>
    <text x="835" y="401" text-anchor="middle" font-size="22" font-weight="700" fill="#8792a2">Scheduler</text>
    <text x="835" y="433" text-anchor="middle" font-size="15" fill="#536170">按 CPU/GPU 调度</text>
    <text x="835" y="456" text-anchor="middle" font-size="15" fill="#536170">失败重试 / 资源隔离</text>

    <rect x="235" y="535" width="710" height="62" rx="18" fill="#17324d"/>
    <text x="590" y="573" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">Dashboard + Resources：看见任务、GPU、CPU、内存和失败日志</text>
  </g>
</svg>
