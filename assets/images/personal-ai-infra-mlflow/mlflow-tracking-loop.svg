<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">MLflow 实验追踪闭环</title>
  <desc id="desc">展示从实验配置到训练、评测、产物保存和复盘的闭环</desc>
  <rect width="1080" height="560" rx="28" fill="#fbfaf7"/>
  <text x="56" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">一次 MLflow Run 应该记录什么？</text>
  <text x="58" y="110" font-family="Arial, sans-serif" font-size="18" fill="#64748b">不要只记录 loss，要把“能不能复现”所需的信息都放进去</text>

  <g font-family="Arial, sans-serif">
    <rect x="96" y="190" width="170" height="100" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="181" y="229" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">配置</text>
    <text x="181" y="259" text-anchor="middle" font-size="15" fill="#64748b">模型 / 数据 / 超参</text>

    <rect x="344" y="190" width="170" height="100" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="429" y="229" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">训练</text>
    <text x="429" y="259" text-anchor="middle" font-size="15" fill="#64748b">loss / tokens/s</text>

    <rect x="592" y="190" width="170" height="100" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="677" y="229" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">评测</text>
    <text x="677" y="259" text-anchor="middle" font-size="15" fill="#64748b">benchmark / case</text>

    <rect x="840" y="190" width="170" height="100" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="925" y="229" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">产物</text>
    <text x="925" y="259" text-anchor="middle" font-size="15" fill="#64748b">权重 / 报告 / 日志</text>

    <path d="M266 240 H344" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>
    <path d="M514 240 H592" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>
    <path d="M762 240 H840" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>
    <path d="M925 290 C925 395 181 395 181 290" fill="none" stroke="#94a3b8" stroke-width="4" stroke-dasharray="12 10"/>
    <text x="553" y="394" text-anchor="middle" font-size="17" fill="#475569">对比 run，选择模型，复盘失败，回滚版本</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="115" y="435" width="190" height="52" rx="10" fill="#e0f2fe"/>
    <text x="210" y="468" text-anchor="middle" font-size="16" fill="#075985">params</text>
    <rect x="330" y="435" width="190" height="52" rx="10" fill="#dcfce7"/>
    <text x="425" y="468" text-anchor="middle" font-size="16" fill="#166534">metrics</text>
    <rect x="545" y="435" width="190" height="52" rx="10" fill="#fef9c3"/>
    <text x="640" y="468" text-anchor="middle" font-size="16" fill="#854d0e">artifacts</text>
    <rect x="760" y="435" width="190" height="52" rx="10" fill="#ede9fe"/>
    <text x="855" y="468" text-anchor="middle" font-size="16" fill="#5b21b6">tags</text>
  </g>
</svg>
