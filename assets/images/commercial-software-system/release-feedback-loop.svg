<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">商业系统发布反馈闭环</title>
  <desc id="desc">展示需求、开发、测试、灰度、监控、反馈、迭代的闭环</desc>
  <rect width="1080" height="560" rx="28" fill="#f8fafc"/>
  <text x="56" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">发布闭环：商业系统上线后才是真正开始</text>
  <text x="58" y="110" font-family="Arial, sans-serif" font-size="18" fill="#64748b">从需求到监控反馈，必须形成可追踪、可回滚、可持续改进的工程闭环</text>
  <g font-family="Arial, sans-serif">
    <rect x="85" y="220" width="135" height="80" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="152" y="253" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">需求</text>
    <text x="152" y="278" text-anchor="middle" font-size="14" fill="#64748b">验收标准</text>
    <rect x="270" y="220" width="135" height="80" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="337" y="253" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">开发</text>
    <text x="337" y="278" text-anchor="middle" font-size="14" fill="#64748b">代码评审</text>
    <rect x="455" y="220" width="135" height="80" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="522" y="253" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">测试</text>
    <text x="522" y="278" text-anchor="middle" font-size="14" fill="#64748b">自动化</text>
    <rect x="640" y="220" width="135" height="80" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="707" y="253" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">灰度</text>
    <text x="707" y="278" text-anchor="middle" font-size="14" fill="#64748b">小流量</text>
    <rect x="825" y="220" width="135" height="80" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="892" y="253" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">监控</text>
    <text x="892" y="278" text-anchor="middle" font-size="14" fill="#64748b">指标告警</text>
    <path d="M220 260 H270" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>
    <path d="M405 260 H455" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>
    <path d="M590 260 H640" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>
    <path d="M775 260 H825" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>
    <path d="M892 300 C892 425 152 425 152 300" fill="none" stroke="#94a3b8" stroke-width="4" stroke-dasharray="12 10"/>
    <text x="522" y="425" text-anchor="middle" font-size="17" fill="#475569">线上反馈、故障复盘、用户行为数据，回到下一轮需求和设计</text>
  </g>
</svg>
