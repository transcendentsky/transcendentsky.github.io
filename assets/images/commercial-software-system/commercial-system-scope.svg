<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">商业软件系统关注面</title>
  <desc id="desc">展示商业软件相比个人 demo 需要考虑的需求、架构、安全、测试、运维和合规</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#f3f7ed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1080" height="560" rx="28" fill="url(#bg)"/>
  <text x="56" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">商业软件系统：从“能跑”到“可长期交付”</text>
  <text x="58" y="110" font-family="Arial, sans-serif" font-size="18" fill="#64748b">个人 demo 证明想法，商业系统要承载真实用户、真实数据、真实责任</text>
  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="95" y="175" width="190" height="100" rx="18" fill="#ffffff"/>
    <text x="190" y="215" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">需求边界</text>
    <text x="190" y="244" text-anchor="middle" font-size="15" fill="#64748b">场景 / 用户 / SLA</text>
    <rect x="325" y="175" width="190" height="100" rx="18" fill="#ffffff"/>
    <text x="420" y="215" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">架构质量</text>
    <text x="420" y="244" text-anchor="middle" font-size="15" fill="#64748b">扩展 / 隔离 / 可维护</text>
    <rect x="555" y="175" width="190" height="100" rx="18" fill="#ffffff"/>
    <text x="650" y="215" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">安全数据</text>
    <text x="650" y="244" text-anchor="middle" font-size="15" fill="#64748b">权限 / 隐私 / 审计</text>
    <rect x="785" y="175" width="190" height="100" rx="18" fill="#ffffff"/>
    <text x="880" y="215" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">测试验证</text>
    <text x="880" y="244" text-anchor="middle" font-size="15" fill="#64748b">功能 / 性能 / 回归</text>
    <rect x="210" y="350" width="250" height="100" rx="18" fill="#ffffff"/>
    <text x="335" y="390" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">发布运维</text>
    <text x="335" y="419" text-anchor="middle" font-size="15" fill="#64748b">CI/CD / 监控 / 回滚</text>
    <rect x="620" y="350" width="250" height="100" rx="18" fill="#ffffff"/>
    <text x="745" y="390" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">成本合规</text>
    <text x="745" y="419" text-anchor="middle" font-size="15" fill="#64748b">预算 / 许可 / 风险</text>
  </g>
  <text x="540" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">商业系统不是 demo 加 UI，而是工程、质量、流程和责任的组合</text>
</svg>
