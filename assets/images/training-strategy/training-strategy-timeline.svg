<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" role="img" aria-label="大模型训练策略时间线">
  <defs>
    <style>
      .bg{fill:#fbfaf7}
      .axis{stroke:#2f3a3f;stroke-width:4;stroke-linecap:round}
      .tick{stroke:#2f3a3f;stroke-width:3}
      .card{fill:#fff;stroke:#d8d0c3;stroke-width:2;rx:14}
      .title{font:700 30px 'Microsoft YaHei','Noto Sans CJK SC',Arial,sans-serif;fill:#1f2a2e}
      .label{font:700 24px 'Microsoft YaHei','Noto Sans CJK SC',Arial,sans-serif;fill:#1f2a2e}
      .small{font:18px 'Microsoft YaHei','Noto Sans CJK SC',Arial,sans-serif;fill:#4a555a}
      .year{font:700 18px Arial,sans-serif;fill:#617077}
      .pill{fill:#e9f1ee;stroke:#b8d2c7}
      .accent1{fill:#e8f0ff;stroke:#9cb9ee}
      .accent2{fill:#fff1d8;stroke:#e4bd70}
      .accent3{fill:#f1e9ff;stroke:#bca3e8}
      .accent4{fill:#e8f7ef;stroke:#8fc9a6}
      .accent5{fill:#ffe8e5;stroke:#e69a8f}
    </style>
  </defs>
  <rect class="bg" width="1100" height="420"/>
  <text class="title" x="60" y="58">大模型后训练策略的演进</text>
  <text class="small" x="60" y="90">从“会续写”到“听指令”，再到“符合偏好”和“用可验证奖励提升推理”。</text>
  <line class="axis" x1="105" y1="235" x2="995" y2="235"/>
  <g>
    <line class="tick" x1="145" y1="220" x2="145" y2="250"/>
    <rect class="card accent1" x="65" y="125" width="160" height="78"/>
    <text class="label" x="145" y="158" text-anchor="middle">预训练</text>
    <text class="small" x="145" y="185" text-anchor="middle">预测下一个 token</text>
    <text class="year" x="145" y="282" text-anchor="middle">GPT 时代</text>
  </g>
  <g>
    <line class="tick" x1="315" y1="220" x2="315" y2="250"/>
    <rect class="card accent2" x="235" y="270" width="160" height="82"/>
    <text class="label" x="315" y="304" text-anchor="middle">SFT</text>
    <text class="small" x="315" y="331" text-anchor="middle">模仿示范答案</text>
    <text class="year" x="315" y="205" text-anchor="middle">指令微调</text>
  </g>
  <g>
    <line class="tick" x1="485" y1="220" x2="485" y2="250"/>
    <rect class="card accent3" x="405" y="125" width="160" height="78"/>
    <text class="label" x="485" y="158" text-anchor="middle">RLHF / PPO</text>
    <text class="small" x="485" y="185" text-anchor="middle">用人类偏好对齐</text>
    <text class="year" x="485" y="282" text-anchor="middle">InstructGPT</text>
  </g>
  <g>
    <line class="tick" x1="655" y1="220" x2="655" y2="250"/>
    <rect class="card accent4" x="575" y="270" width="160" height="82"/>
    <text class="label" x="655" y="304" text-anchor="middle">DPO</text>
    <text class="small" x="655" y="331" text-anchor="middle">直接优化偏好对</text>
    <text class="year" x="655" y="205" text-anchor="middle">开源后训练</text>
  </g>
  <g>
    <line class="tick" x1="825" y1="220" x2="825" y2="250"/>
    <rect class="card accent5" x="745" y="125" width="160" height="78"/>
    <text class="label" x="825" y="158" text-anchor="middle">GRPO</text>
    <text class="small" x="825" y="185" text-anchor="middle">组内比较做推理 RL</text>
    <text class="year" x="825" y="282" text-anchor="middle">DeepSeek-R1</text>
  </g>
  <path d="M995 235 L970 220 L970 250 Z" fill="#2f3a3f"/>
  <rect class="pill" x="895" y="310" width="145" height="46" rx="23"/>
  <text class="small" x="967" y="339" text-anchor="middle">可验证奖励</text>
</svg>
