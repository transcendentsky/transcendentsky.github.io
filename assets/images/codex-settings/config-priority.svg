<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600" role="img" aria-labelledby="title desc">
  <title id="title">Codex 配置加载优先级</title>
  <desc id="desc">展示管理员、用户全局、Profile、项目配置、命令行和当前会话设置的优先级。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#475569"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .bg{fill:#f8fafc}.title{font:700 34px sans-serif;fill:#111827}.sub{font:400 17px sans-serif;fill:#475569}.node{fill:#fff;stroke:#d7dee9;stroke-width:1.3;filter:url(#shadow)}.h{font:700 19px sans-serif;fill:#111827}.t{font:400 14px sans-serif;fill:#475569}.mono{font:600 13px monospace;fill:#334155}.line{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}.note{fill:#fff7ed;stroke:#fed7aa;stroke-width:1.2}.noteh{font:700 18px sans-serif;fill:#9a3412}.notet{font:400 14px sans-serif;fill:#7c2d12}.badge{font:700 14px sans-serif;fill:#fff}.red{fill:#dc2626}.blue{fill:#2563eb}.green{fill:#059669}.amber{fill:#d97706}.slate{fill:#475569}
    </style>
  </defs>
  <rect class="bg" width="1100" height="600"/>
  <text x="58" y="64" class="title">配置优先级：越靠近当前任务，越具体</text>
  <text x="58" y="98" class="sub">敏感配置仍由用户级控制，项目不能劫持模型供应商、认证、通知和 telemetry。</text>

  <rect x="80" y="140" width="295" height="72" rx="12" class="node"/>
  <rect x="100" y="164" width="34" height="24" rx="12" class="red"/><text x="112" y="181" class="badge">1</text>
  <text x="150" y="169" class="h">管理员强制要求</text>
  <text x="150" y="193" class="t">组织或系统级安全边界</text>

  <path d="M375 176 C423 176, 430 176, 468 176" class="line"/>

  <rect x="480" y="140" width="295" height="72" rx="12" class="node"/>
  <rect x="500" y="164" width="34" height="24" rx="12" class="blue"/><text x="512" y="181" class="badge">2</text>
  <text x="550" y="169" class="h">用户全局配置</text>
  <text x="550" y="193" class="mono">~/.codex/config.toml</text>

  <path d="M628 212 C628 248, 628 256, 628 288" class="line"/>

  <rect x="480" y="300" width="295" height="72" rx="12" class="node"/>
  <rect x="500" y="324" width="34" height="24" rx="12" class="green"/><text x="512" y="341" class="badge">3</text>
  <text x="550" y="329" class="h">指定 Profile</text>
  <text x="550" y="353" class="mono">codex --profile deep-review</text>

  <path d="M480 336 C430 336, 420 336, 382 336" class="line"/>

  <rect x="80" y="300" width="295" height="72" rx="12" class="node"/>
  <rect x="100" y="324" width="34" height="24" rx="12" class="amber"/><text x="112" y="341" class="badge">4</text>
  <text x="150" y="329" class="h">项目根目录配置</text>
  <text x="150" y="353" class="mono">repo/.codex/config.toml</text>

  <path d="M228 372 C228 408, 228 416, 228 448" class="line"/>

  <rect x="80" y="460" width="295" height="72" rx="12" class="node"/>
  <rect x="100" y="484" width="34" height="24" rx="12" class="amber"/><text x="112" y="501" class="badge">5</text>
  <text x="150" y="489" class="h">项目子目录配置</text>
  <text x="150" y="513" class="mono">repo/apps/web/.codex/config.toml</text>

  <path d="M375 496 C423 496, 430 496, 468 496" class="line"/>

  <rect x="480" y="460" width="295" height="72" rx="12" class="node"/>
  <rect x="500" y="484" width="34" height="24" rx="12" class="slate"/><text x="512" y="501" class="badge">6</text>
  <text x="550" y="489" class="h">命令行参数</text>
  <text x="550" y="513" class="t">本次启动的显式覆盖</text>

  <path d="M775 496 C823 496, 830 496, 868 496" class="line"/>

  <rect x="880" y="460" width="170" height="72" rx="12" class="node"/>
  <rect x="900" y="484" width="34" height="24" rx="12" class="slate"/><text x="912" y="501" class="badge">7</text>
  <text x="948" y="489" class="h">会话临时设置</text>
  <text x="948" y="513" class="t">当前任务上下文</text>

  <rect x="820" y="148" width="230" height="190" rx="12" class="note"/>
  <text x="845" y="184" class="noteh">项目配置不能覆盖</text>
  <text x="845" y="218" class="notet">model_provider / providers</text>
  <text x="845" y="244" class="notet">openai_base_url / chatgpt_base_url</text>
  <text x="845" y="270" class="notet">notify / profile / profiles</text>
  <text x="845" y="296" class="notet">otel / 认证和凭据</text>
</svg>
