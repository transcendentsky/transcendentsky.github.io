<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">XTuner 在个人 AI Infra 中的位置</title>
  <desc id="desc">展示 XTuner 作为微调层连接数据、基础模型、LoRA 产物、评测和推理服务</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9fbff"/>
      <stop offset="100%" stop-color="#f3f7ed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1080" height="560" rx="28" fill="url(#bg)"/>
  <text x="56" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">XTuner：个人 AI Infra 的微调层</text>
  <text x="58" y="110" font-family="Arial, sans-serif" font-size="18" fill="#64748b">把数据和基础模型变成可评测、可合并、可部署的 LoRA / QLoRA 产物</text>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="72" y="190" width="160" height="88" rx="16" fill="#ffffff"/>
    <text x="152" y="226" text-anchor="middle" font-size="20" font-weight="700" fill="#172033">训练数据</text>
    <text x="152" y="254" text-anchor="middle" font-size="15" fill="#5b6775">SFT / Agent / VLM</text>

    <rect x="278" y="190" width="160" height="88" rx="16" fill="#ffffff"/>
    <text x="358" y="226" text-anchor="middle" font-size="20" font-weight="700" fill="#172033">基础模型</text>
    <text x="358" y="254" text-anchor="middle" font-size="15" fill="#5b6775">Qwen / Llama / InternLM</text>

    <rect x="492" y="155" width="205" height="158" rx="22" fill="#7c3aed"/>
    <text x="594" y="213" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">XTuner</text>
    <text x="594" y="249" text-anchor="middle" font-size="17" fill="#ede9fe">LoRA / QLoRA</text>
    <text x="594" y="275" text-anchor="middle" font-size="15" fill="#ede9fe">Config + Dataset + Train</text>

    <rect x="752" y="190" width="160" height="88" rx="16" fill="#ffffff"/>
    <text x="832" y="226" text-anchor="middle" font-size="20" font-weight="700" fill="#172033">Adapter</text>
    <text x="832" y="254" text-anchor="middle" font-size="15" fill="#5b6775">pth / HF / merged</text>
  </g>

  <path d="M232 234 H278" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
  <path d="M438 234 H492" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
  <path d="M697 234 H752" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>

  <g font-family="Arial, sans-serif">
    <rect x="154" y="390" width="190" height="56" rx="28" fill="#e0f2fe"/>
    <text x="249" y="425" text-anchor="middle" font-size="16" fill="#075985">MLflow 记录实验</text>
    <rect x="390" y="390" width="190" height="56" rx="28" fill="#dcfce7"/>
    <text x="485" y="425" text-anchor="middle" font-size="16" fill="#166534">Ray 调度训练</text>
    <rect x="626" y="390" width="190" height="56" rx="28" fill="#fef3c7"/>
    <text x="721" y="425" text-anchor="middle" font-size="16" fill="#854d0e">vLLM/LMDeploy 部署</text>
  </g>
  <text x="540" y="503" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">个人微调最重要的不是跑一次，而是让数据、配置、权重、评测和部署可追踪</text>
</svg>
