<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">XTuner 与个人 AI Infra 闭环</title>
  <desc id="desc">展示 Ray、XTuner、MLflow、vLLM/LMDeploy、RAG/Agent 之间的迭代闭环</desc>
  <rect width="1080" height="560" rx="28" fill="#f8fafc"/>
  <text x="56" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">微调闭环：训练不是终点，部署和反馈才是</text>
  <text x="58" y="110" font-family="Arial, sans-serif" font-size="18" fill="#64748b">XTuner 产出的 adapter 需要被记录、评测、部署、收集 bad cases，再回到下一轮数据</text>
  <g font-family="Arial, sans-serif">
    <rect x="98" y="210" width="160" height="80" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="178" y="244" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Ray</text>
    <text x="178" y="270" text-anchor="middle" font-size="14" fill="#64748b">调度训练任务</text>

    <rect x="330" y="210" width="160" height="80" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="410" y="244" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">XTuner</text>
    <text x="410" y="270" text-anchor="middle" font-size="14" fill="#64748b">LoRA / QLoRA</text>

    <rect x="562" y="210" width="160" height="80" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="642" y="244" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">MLflow</text>
    <text x="642" y="270" text-anchor="middle" font-size="14" fill="#64748b">记录与版本</text>

    <rect x="794" y="210" width="185" height="80" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="886" y="244" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">推理服务</text>
    <text x="886" y="270" text-anchor="middle" font-size="14" fill="#64748b">vLLM / LMDeploy</text>

    <path d="M258 250 H330" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
    <path d="M490 250 H562" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
    <path d="M722 250 H794" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
    <path d="M886 290 C886 420 178 420 178 290" fill="none" stroke="#94a3b8" stroke-width="4" stroke-dasharray="12 10"/>
    <text x="532" y="415" text-anchor="middle" font-size="17" fill="#475569">RAG / Agent / 用户反馈 → bad cases → 数据清洗 → 下一轮微调</text>
  </g>
  <g font-family="Arial, sans-serif">
    <rect x="180" y="465" width="180" height="46" rx="23" fill="#e0f2fe"/>
    <text x="270" y="494" text-anchor="middle" font-size="15" fill="#075985">数据版本</text>
    <rect x="390" y="465" width="180" height="46" rx="23" fill="#dcfce7"/>
    <text x="480" y="494" text-anchor="middle" font-size="15" fill="#166534">训练配置</text>
    <rect x="600" y="465" width="180" height="46" rx="23" fill="#fef3c7"/>
    <text x="690" y="494" text-anchor="middle" font-size="15" fill="#854d0e">评测报告</text>
    <rect x="810" y="465" width="180" height="46" rx="23" fill="#ede9fe"/>
    <text x="900" y="494" text-anchor="middle" font-size="15" fill="#5b21b6">部署版本</text>
  </g>
</svg>
