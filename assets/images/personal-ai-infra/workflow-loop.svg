<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">Personal AI infra workflow loop</title>
  <desc id="desc">A personal AI workflow loop from dataset preparation, fine tuning, experiment tracking, model registry, inference serving, RAG and feedback.</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 Z" fill="#5b6976"/>
    </marker>
    <filter id="shadow" x="-15%" y="-30%" width="130%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#17324d" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1180" height="640" rx="28" fill="#f6f8fb"/>
  <text x="590" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17324d">个人 AI Infra 工作流闭环</text>
  <text x="590" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#607080">一台工作站也能完成数据、微调、记录、服务、RAG 和反馈迭代</text>

  <g stroke="#5b6976" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M310 225 C420 130 760 130 870 225"/>
    <path d="M950 320 C915 475 720 520 590 480"/>
    <path d="M510 480 C380 520 190 475 230 320"/>
    <path d="M325 310 H485"/>
    <path d="M695 310 H850"/>
  </g>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="110" y="200" width="220" height="120" rx="18" fill="#ffffff"/>
    <text x="220" y="243" text-anchor="middle" font-size="22" font-weight="700" fill="#f2994a">数据准备</text>
    <text x="220" y="274" text-anchor="middle" font-size="15" fill="#536170">SFT / 偏好 / RAG 文档</text>
    <text x="220" y="297" text-anchor="middle" font-size="15" fill="#536170">版本化与清洗</text>

    <rect x="480" y="160" width="220" height="120" rx="18" fill="#ffffff"/>
    <text x="590" y="203" text-anchor="middle" font-size="22" font-weight="700" fill="#b25cff">XTuner 微调</text>
    <text x="590" y="234" text-anchor="middle" font-size="15" fill="#536170">LoRA / QLoRA</text>
    <text x="590" y="257" text-anchor="middle" font-size="15" fill="#536170">Ray 提交任务</text>

    <rect x="850" y="200" width="220" height="120" rx="18" fill="#ffffff"/>
    <text x="960" y="243" text-anchor="middle" font-size="22" font-weight="700" fill="#00a878">MLflow 记录</text>
    <text x="960" y="274" text-anchor="middle" font-size="15" fill="#536170">参数 / 指标 / 权重</text>
    <text x="960" y="297" text-anchor="middle" font-size="15" fill="#536170">模型仓库</text>

    <rect x="480" y="430" width="220" height="120" rx="18" fill="#ffffff"/>
    <text x="590" y="473" text-anchor="middle" font-size="22" font-weight="700" fill="#2f80ed">推理服务</text>
    <text x="590" y="504" text-anchor="middle" font-size="15" fill="#536170">LMDeploy / vLLM</text>
    <text x="590" y="527" text-anchor="middle" font-size="15" fill="#536170">OpenAI API</text>

    <rect x="490" y="300" width="200" height="78" rx="18" fill="#17324d"/>
    <text x="590" y="333" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">反馈迭代</text>
    <text x="590" y="358" text-anchor="middle" font-size="14" fill="#cfe2ee">评测、日志、错误样本回流</text>
  </g>
</svg>
